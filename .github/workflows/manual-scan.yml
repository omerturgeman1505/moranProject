name: Moran Manual Job Scan

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Firebase service account
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret" >&2
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase-service-account.json

      - name: Run scan
        env:
          FIREBASE_SERVICE_ACCOUNT: firebase-service-account.json
          FIREBASE_RTDB_URL: https://moran-cce72-default-rtdb.europe-west1.firebasedatabase.app
        run: python daily_scan.py

      - name: Remove temporary service account
        if: always()
        run: rm -f firebase-service-account.json
