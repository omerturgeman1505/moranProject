name: Deploy to Firebase Hosting

on:
  workflow_dispatch:   # Manual trigger from GitHub Actions tab
  push:
    branches:
      - main           # Auto-deploy when merged to main
    paths:
      - "public/**"    # Only when front-end files change

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write Firebase service account
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret" >&2
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > firebase-service-account.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json
        run: firebase deploy --only hosting --project moran-cce72 --non-interactive

      - name: Remove service account
        if: always()
        run: rm -f firebase-service-account.json
